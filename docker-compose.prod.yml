services:
  migrate:
    build:
      context: .
      target: development
    container_name: rentflow360_migrate
    env_file:
      - .env.production
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"

  app:
    build:
      context: .
      target: runner
    container_name: rentflow360_app
    init: true
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
