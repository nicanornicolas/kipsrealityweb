version: '3.8'

services:
  app:
    build:
      context: .
      target: development
    container_name: rentflow360_app
    init: true
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    command: sh -c "npx prisma migrate deploy && npm run dev -- --hostname 0.0.0.0"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: rentflow360_db
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  adminer:
    image: adminer
    container_name: rentflow360_adminer
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: rentflow360_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: rentflow_storage
    environment:
      # Squad 2 will use these credentials in the .env file for the AWS SDK
      - MINIO_ROOT_USER=${MINIO_USER:-rentflow_admin}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD:-SuperSecretStorageKey2026!}
    ports:
      - "9000:9000" # The S3 API Port (Next.js/Node talks to this)
      - "9001:9001" # The Admin UI Console (You log into this via browser)
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  db_data:
  minio_data: # Persistent storage so PDFs survive container restarts
