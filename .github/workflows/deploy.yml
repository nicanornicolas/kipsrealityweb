name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Prevent overlapping deploys (important for production stability)
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    env:
      APP_DIR: /home/kipsreality/kipsrealityweb

    steps:
      # NOTE: No checkout needed — deployment happens on the server using git fetch/reset

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.SSH_PRIVATE_KEY }}"
          test -n "${{ secrets.SERVER_HOST }}"
          test -n "${{ secrets.SERVER_USER }}"
          test -n "${{ secrets.SSH_KNOWN_HOSTS }}"

      - name: Set up SSH key and known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Use modern key filename (works even if content is RSA/ED25519)
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Strict host key pinning (recommended for production)
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH connectivity
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=yes \
            "${SERVER_USER}@${SERVER_HOST}" \
            "echo 'SSH connection OK'"

      - name: Deploy to server
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "Connecting to ${SERVER_USER}@${SERVER_HOST}..."
          echo "Deploying commit ${GITHUB_SHA} from branch ${GITHUB_REF_NAME}"

          ssh -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o StrictHostKeyChecking=yes \
            "${SERVER_USER}@${SERVER_HOST}" << EOF
            set -euo pipefail

            APP_DIR="${APP_DIR}"
            REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"
            TARGET_BRANCH="${GITHUB_REF_NAME}"
            TARGET_COMMIT="${GITHUB_SHA}"

            echo "==> Server: \$(hostname)"
            echo "==> App dir: \$APP_DIR"
            echo "==> Branch: \$TARGET_BRANCH"
            echo "==> Commit: \$TARGET_COMMIT"

            if [ ! -d "\$APP_DIR" ]; then
              echo "ERROR: App directory not found: \$APP_DIR"
              exit 1
            fi

            cd "\$APP_DIR"

            # Safety check: ensure this is a git repo
            if [ ! -d .git ]; then
              echo "ERROR: \$APP_DIR is not a git repository"
              exit 1
            fi

            # Optional sanity check: show current remote
            CURRENT_REMOTE=\$(git remote get-url origin || true)
            echo "==> Current origin: \$CURRENT_REMOTE"

            echo "==> Fetching latest code..."
            git fetch --prune origin

            # Verify the commit exists after fetch (extra safety)
            git rev-parse --verify "\$TARGET_COMMIT^{commit}" >/dev/null 2>&1 || {
              echo "ERROR: Target commit not found: \$TARGET_COMMIT"
              exit 1
            }

            echo "==> Checking out branch..."
            git checkout -f "\$TARGET_BRANCH"

            echo "==> Resetting to exact commit..."
            git reset --hard "\$TARGET_COMMIT"

            echo "==> Running deploy script..."
            chmod +x deploy.sh

            # If 'timeout' exists, prevent hanging deployments
            if command -v timeout >/dev/null 2>&1; then
              timeout 900 ./deploy.sh
            else
              ./deploy.sh
            fi

            echo "==> Deployment completed successfully"
          EOF

      - name: Deployment summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Production Deployment Result"
            echo ""
            echo "- **Repository:** \`${{ github.repository }}\`"
            echo "- **Branch:** \`${{ github.ref_name }}\`"
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Actor:** \`${{ github.actor }}\`"
            echo "- **Run:** #${{ github.run_number }}"
            echo "- **Status:** ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Success log
        if: success()
        run: |
          echo "✅ Production deploy succeeded"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
