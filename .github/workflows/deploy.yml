name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    env:
      APP_DIR: /home/kipsreality/kipsrealityweb
      SERVER_HOST: ${{ secrets.SERVER_HOST || '' }}
      SERVER_USER: ${{ secrets.SERVER_USER || '' }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY || '' }}
      SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS || '' }}

    steps:

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SERVER_HOST"
          test -n "$SERVER_USER"
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"

      - name: Set up SSH key and known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH connectivity
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=yes \
            "${SERVER_USER}@${SERVER_HOST}" \
            "echo 'SSH connection OK'"

      - name: Deploy to server
        shell: bash
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          echo "Connecting to ${SERVER_USER}@${SERVER_HOST}..."
          echo "Deploying commit ${GITHUB_SHA} from branch ${GITHUB_REF_NAME}"

          ssh -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o StrictHostKeyChecking=yes \
            "${SERVER_USER}@${SERVER_HOST}" << EOF
            set -euo pipefail

            APP_DIR="${APP_DIR}"
            TARGET_BRANCH="${GITHUB_REF_NAME}"
            TARGET_COMMIT="${GITHUB_SHA}"

            echo "==> Server: \$(hostname)"
            echo "==> App dir: \$APP_DIR"
            echo "==> Branch: \$TARGET_BRANCH"
            echo "==> Commit: \$TARGET_COMMIT"

            if [ ! -d "\$APP_DIR" ]; then
              echo "ERROR: App directory not found: \$APP_DIR"
              exit 1
            fi

            cd "\$APP_DIR"

            if [ ! -d .git ]; then
              echo "ERROR: \$APP_DIR is not a git repository"
              exit 1
            fi

            echo "==> Fetching latest code..."
            git fetch --prune origin

            git rev-parse --verify "\$TARGET_COMMIT^{commit}" >/dev/null 2>&1 || {
              echo "ERROR: Target commit not found: \$TARGET_COMMIT"
              exit 1
            }

            echo "==> Checking out branch..."
            git checkout -f "\$TARGET_BRANCH"

            echo "==> Resetting to exact commit..."
            git reset --hard "\$TARGET_COMMIT"

            echo "==> Running deploy script..."
            chmod +x deploy.sh

            if command -v timeout >/dev/null 2>&1; then
              timeout 900 ./deploy.sh
            else
              ./deploy.sh
            fi

            echo "==> Deployment completed successfully"
          EOF

      - name: Deployment summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Production Deployment Result"
            echo ""
            echo "- **Repository:** \`${{ github.repository }}\`"
            echo "- **Branch:** \`${{ github.ref_name }}\`"
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Actor:** \`${{ github.actor }}\`"
            echo "- **Run:** #${{ github.run_number }}"
            echo "- **Status:** ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

