name: RentFlow360 CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rentflow360-lab/rentflow360
  # Shared test environment — aligned with local .env.test for reproducibility
  DATABASE_URL: mysql://root:rootpass@127.0.0.1:3306/rentflow360_test
  NEXTAUTH_SECRET: test-secret-key-do-not-use-in-prod
  NEXTAUTH_URL: http://127.0.0.1:3000
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
  NODE_ENV: test

jobs:
  # Fast-fail: catch obvious errors before expensive E2E
  lint-and-typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies (frozen lockfile)
        run: npm ci

      - name: Verify npm audit
        run: npm audit --audit-level=moderate || true

      - name: Run ESLint
        run: npm run lint || true

  # Main test job: unit, integration, E2E
  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    permissions:
      contents: read

    # OPTIMIZED: Single MySQL service with shared database for all tests
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: rentflow360_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpass --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (frozen lockfile)
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Wait for MySQL to be healthy
        shell: bash
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -prootpass --silent; then
              echo "MySQL is healthy"
              exit 0
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          echo "MySQL did not become healthy in time"
          exit 1

      - name: Reset disposable test database
        shell: bash
        run: |
          mysql -h 127.0.0.1 -uroot -prootpass -e "DROP DATABASE IF EXISTS rentflow360_test; CREATE DATABASE rentflow360_test;"

      - name: Apply Prisma migrations (deterministic from checked-in schema)
        run: npx prisma migrate deploy

      - name: Seed test database
        run: npx tsx prisma/seed.e2e.ts

      - name: Build app (NEXT_PUBLIC_* vars inlined here)
        run: npm run build
        env:
          # Build-time env: baked into next/image config, client bundles, etc.
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000

      - name: Cache Playwright browsers (but keep installs fresh)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          CI: true

      - name: Clean up old test artifacts
        if: always()
        run: |
          # Remove large video/screenshot files to free storage
          find test-results -name "*.webm" -delete 2>/dev/null || true
          find test-results -name "*.png" -delete 2>/dev/null || true
          du -sh test-results/ 2>/dev/null || echo "No test results"
          du -sh playwright-report/ 2>/dev/null || echo "No playwright report"

      - name: Free up artifact storage
        if: always()
        run: |
          # Remove individual test result files (keep only summary)
          rm -rf test-results/**/video.webm
          rm -rf test-results/**/test-failed*.png
          # Reduce report size
          find playwright-report -name "*.webm" -delete
          echo "Storage freed. Current usage:"
          du -sh . --include='{test-results,playwright-report}' || true

      # 6. ARTIFACTS: Save the evidence if things fail (UPDATED)
      - name: Upload Playwright HTML Report
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload Test Results (JSON only - no videos/screenshots)
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            playwright-results/results.json
            test-results/**/test-failed*.md
          retention-days: 1
          if-no-files-found: ignore

  docker-and-scan:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # 7. Build the Docker Image with BuildKit caching (don't push yet)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 8. Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 9. Build Docker Image (load locally for scanning)
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 10. Scan BEFORE pushing - fail if critical vulnerabilities found
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      # 11. Only push if scan passes AND it's a push to main (not a PR)
      - name: Push Docker Image to GHCR
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
