name: RentFlow360 CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # OPTIMIZED: Single MySQL service with shared database for all tests
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root_password
          MYSQL_DATABASE: rentflow_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3307:3306
        options: --health-cmd="mysqladmin ping -h localhost -u test_user -ptest_password" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # 1. Run Unit Tests (Fast, no DB required)
      - name: Run Unit Tests (Vitest)
        run: pnpm run test:unit

      # 2. Setup Test DB & Run Integration Tests (uses port 3307)
      - name: Prepare Test Database
        run: pnpm exec prisma db push --accept-data-loss
        env:
          DATABASE_URL: mysql://test_user:test_password@localhost:3307/rentflow_test

      - name: Run Integration Tests (Vitest)
        run: pnpm run test:integration
        env:
          DATABASE_URL: mysql://test_user:test_password@localhost:3307/rentflow_test
          INTEGRATION_TEST_DATABASE_URL: mysql://test_user:test_password@localhost:3307/rentflow_test

      # 3. Run E2E Tests (Playwright) - uses same database on port 3307
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Run E2E Tests
        run: pnpm run test:e2e:ci
        env:
          DATABASE_URL: mysql://test_user:test_password@localhost:3307/rentflow_test
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      # 4. Upload Test Artifacts (Playwright reports)
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: playwright-results/
          retention-days: 30

      # 5. Build the Docker Image with BuildKit caching (don't push yet)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 7. Build Docker Image (load locally for scanning)
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 8. Scan BEFORE pushing - fail if critical vulnerabilities found
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # 9. Only push if scan passes AND it's a push to main (not a PR)
      - name: Push Docker Image to GHCR
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
