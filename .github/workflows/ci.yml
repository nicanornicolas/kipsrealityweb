name: RentFlow360 CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rentflow360-lab/rentflow360

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # OPTIMIZED: Single MySQL service with shared database for all tests
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root_password
          MYSQL_DATABASE: rentflow_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3307:3306
        options: --health-cmd="mysqladmin ping -h localhost -u test_user -ptest_password" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup npm
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install --no-frozen-lockfile
        env:
          DATABASE_URL: mysql://test_user:test_password@localhost:3307/rentflow_test

      # 1. FAST FEEDBACK: Unit Tests (Fails in < 5 seconds if logic is broken)
      - name: Run Unit Tests (Vitest)
        run: npm run test:unit

      # 2. DATABASE PREP: Integration Tests
      - name: Prepare Database for Integration Tests
        run: npm exec prisma db push --accept-data-loss
        env:
          DATABASE_URL: mysql://test_user:test_password@localhost:3307/rentflow_test

      - name: Run Integration Tests (Vitest)
        run: npm run test:integration
        env:
          DATABASE_URL: mysql://test_user:test_password@localhost:3307/rentflow_test
          INTEGRATION_TEST_DATABASE_URL: mysql://test_user:test_password@localhost:3307/rentflow_test

      # --- THE CRITICAL STATE BOUNDARY ---
      # 3. NUKE AND PAVE: Isolate E2E from Integration Test pollution
      - name: Reset and Seed E2E Database
        run: |
          npm exec prisma db push --accept-data-loss --force-reset
          npm run db:seed:test
        env:
          DATABASE_URL: mysql://test_user:test_password@localhost:3307/rentflow_test

      # 4. COMPILE: Prevent the "Next.js Dev Server Trap"
      # Build BEFORE running Playwright so webServer can just use "npm run start"
      - name: Build Next.js Production Binary
        run: npm run build
        env:
          # Next.js needs these during build time to safely compile
          DATABASE_URL: mysql://test_user:test_password@localhost:3307/rentflow_test
          NEXTAUTH_SECRET: "test-secret-key-do-not-use-in-prod"
          NEXTAUTH_URL: "http://localhost:3000"

      # 5. EXECUTE: The Optimized Playwright Run
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Check Next.js Build
        run: |
          ls -la .next/
          ls -la .next/standalone/ || echo "No standalone build"
          head -20 .next/standalone/server.js || echo "No server.js found"

      - name: Run E2E Tests (Playwright) with Debug
        run: npm run test:e2e:ci
        env:
          CI: true
          PLAYWRIGHT_BROWSERS_PATH: .playwright-browsers
          DATABASE_URL: mysql://test_user:test_password@localhost:3307/rentflow_test
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXTAUTH_SECRET: "test-secret-key-do-not-use-in-prod"
          NEXTAUTH_URL: "http://localhost:3000"
          DEBUG: "pw:api"
          RUN_ALL_BROWSERS: ${{ github.ref == 'refs/heads/main' && 'true' || 'false' }}

      - name: Clean up old test artifacts
        if: always()
        run: |
          # Remove large video/screenshot files to free storage
          find test-results -name "*.webm" -delete 2>/dev/null || true
          find test-results -name "*.png" -delete 2>/dev/null || true
          du -sh test-results/ 2>/dev/null || echo "No test results"
          du -sh playwright-report/ 2>/dev/null || echo "No playwright report"

      - name: Free up artifact storage
        if: always()
        run: |
          # Remove individual test result files (keep only summary)
          rm -rf test-results/**/video.webm
          rm -rf test-results/**/test-failed*.png
          # Reduce report size
          find playwright-report -name "*.webm" -delete
          echo "Storage freed. Current usage:"
          du -sh . --include='{test-results,playwright-report}' || true

      # 6. ARTIFACTS: Save the evidence if things fail (UPDATED)
      - name: Upload Playwright HTML Report
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload Test Results (JSON only - no videos/screenshots)
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            playwright-results/results.json
            test-results/**/test-failed*.md
          retention-days: 1
          if-no-files-found: ignore

      # 7. Build the Docker Image with BuildKit caching (don't push yet)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 8. Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 9. Build Docker Image (load locally for scanning)
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 10. Scan BEFORE pushing - fail if critical vulnerabilities found
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      # 11. Only push if scan passes AND it's a push to main (not a PR)
      - name: Push Docker Image to GHCR
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
