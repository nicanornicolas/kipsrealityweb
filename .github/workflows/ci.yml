name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DATABASE_URL: 'mysql://root:rootpass@localhost:3307/rentflow360_test'
  JWT_SECRET: 'test-secret'
  NX_CLOUD: 'false'
  NX_NO_CLOUD: 'true'

jobs:
  validate:
    name: Validate & Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Setup Prisma
        run: npx prisma generate

      - name: Derive appropriate SHAs for Nx
        uses: nrwl/nx-set-shas@v4

      - name: Lint (Affected)
        run: npx nx affected -t lint

      - name: Unit Tests & Coverage (Affected Nx Libs)
        run: npx nx affected -t test --coverage

      - name: Integration Tests (Root)
        run: npx vitest run tests/unit/ --passWithNoTests

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: validate
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: rentflow360_test
        ports:
          - 3307:3306
        options: --health-cmd="mysqladmin ping -h localhost -uroot -p$MYSQL_ROOT_PASSWORD" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run E2E Tests
        run: npx playwright test
