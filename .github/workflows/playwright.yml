name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: E2E (Playwright + MySQL)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: rentflow360_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
          MYSQL_ROOT_PASSWORD: rootpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpass --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30

    env:
      CI: "true"
      NODE_ENV: "test"
      DB_HOST: "127.0.0.1"
      DB_PORT: "3306"

      # IMPORTANT: use test DB
      DATABASE_URL: "mysql://testuser:testpass@127.0.0.1:3306/rentflow360_test"

      # Next/Auth (adjust to your app)
      NEXTAUTH_URL: "http://127.0.0.1:3000"
      NEXT_PUBLIC_BASE_URL: "http://127.0.0.1:3000"
      NEXT_PUBLIC_API_URL: "http://127.0.0.1:3000"

      # Secrets for CI only
      # Secrets for CI only
      JWT_SECRET: "ci-jwt-secret-secure-enough"
      JWT_REFRESH_SECRET: "ci-refresh-secret-secure-enough"
      NEXTAUTH_SECRET: "ci-nextauth-secret-secure-enough"
      AUTH_SECRET: "ci-auth-secret-secure-enough"
      NEXTAUTH_TRUST_HOST: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      # Choose ONE of these (migration recommended if you use prisma migrate)
      - name: Apply migrations (recommended)
        run: npx prisma migrate deploy

      # OR if you don’t use migrations in CI:
      # - name: Push schema (dev-style)
      #   run: npx prisma db push --force-reset

      # If you have a seed script (highly recommended)
      - name: Seed E2E database
        run: npx tsx scripts/seed-e2e.ts
        # If your seed runs via package.json:
        # run: npm run seed:e2e

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # If your playwright config starts webServer, you can run tests directly.
      # Otherwise, start Next and run tests.
      # If your playwright config starts webServer, you can run tests directly.
      # Otherwise, start Next and run tests.
      - name: Run Playwright tests
        run: npx playwright test --reporter=html

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30